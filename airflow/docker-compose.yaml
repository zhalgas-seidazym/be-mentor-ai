x-airflow-env: &airflow_env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_API_AUTH_JWT_SECRET}
  AIRFLOW_CONN_MENTORAI_DB: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
  MENTORAI_BACKEND_URL: http://api:8000

x-airflow-volumes: &airflow_volumes
  - ./airflow/dags:/opt/airflow/dags
  - ./airflow/logs:/opt/airflow/logs
  - ./airflow/plugins:/opt/airflow/plugins
  - ./airflow/config:/opt/airflow/config

services:
  api:
    environment:
      AIRFLOW_URL: http://airflow-api-server:8080
      AIRFLOW_USERNAME: airflow
      AIRFLOW_PASSWORD: airflow

  airflow-db:
    image: postgres:16
    container_name: mentor-ai-airflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: mentor-ai-airflow-init
    depends_on:
      airflow-db:
        condition: service_healthy
    env_file:
      - ./.env
    environment: *airflow_env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: *airflow_volumes
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Air \
          --lastname Flow \
          --role Admin \
          --email admin@example.com

  airflow-api-server:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: mentor-ai-airflow-api
    restart: unless-stopped
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v2/monitor/health')\""]
      interval: 10s
      timeout: 10s
      retries: 12
    env_file:
      - ./.env
    environment: *airflow_env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: *airflow_volumes
    ports:
      - "8080:8080"
    command: api-server

  airflow-scheduler:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: mentor-ai-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_healthy
    env_file:
      - ./.env
    environment: *airflow_env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: *airflow_volumes
    command: scheduler

  airflow-triggerer:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: mentor-ai-airflow-triggerer
    restart: unless-stopped
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
      airflow-api-server:
        condition: service_healthy
    env_file:
      - ./.env
    environment: *airflow_env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: *airflow_volumes
    command: triggerer
  
  airflow-dag-processor:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: mentor-ai-airflow-dag-processor
    restart: unless-stopped
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ./.env
    environment: *airflow_env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes: *airflow_volumes
    command: dag-processor

volumes:
  airflow_db_data: